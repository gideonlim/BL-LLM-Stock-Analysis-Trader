name: Monitor Positions

# Checks existing positions for health issues every hour
# during market hours (10 AM - 3 PM ET, Mon-Fri).
# Handles: orphaned brackets, emergency losses, stale SL/TP, gap detection.
on:
  schedule:
    - cron: "0 10 * * 1-5"    # 10 AM ET
      timezone: America/New_York
    - cron: "0 11 * * 1-5"    # 11 AM ET
      timezone: America/New_York
    - cron: "0 12 * * 1-5"    # 12 PM ET
      timezone: America/New_York
    - cron: "0 13 * * 1-5"    #  1 PM ET
      timezone: America/New_York
    - cron: "0 14 * * 1-5"    #  2 PM ET
      timezone: America/New_York
    - cron: "0 15 * * 1-5"    #  3 PM ET
      timezone: America/New_York
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Monitor positions
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: ${{ vars.ALPACA_PAPER || 'true' }}
        run: python -m trading_bot_bl --monitor-only

      - name: Upload monitor logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs-${{ github.run_number }}
          path: execution_logs/monitor_*.json
          retention-days: 14
