name: Monitor Positions

# Checks existing positions for health issues during market hours.
# The 9:35 AM run catches any deferred corrective actions (time exits,
# emergency closes) that were flagged by after-hours monitor runs.
# Handles: orphaned brackets, emergency losses, stale SL/TP, gap detection.
on:
  schedule:
    - cron: "35 9 * * 1-5"    #  9:35 AM ET (market-open, execute deferred actions)
      timezone: America/New_York
    - cron: "0 10 * * 1-5"    # 10 AM ET
      timezone: America/New_York
    - cron: "0 11 * * 1-5"    # 11 AM ET
      timezone: America/New_York
    - cron: "0 12 * * 1-5"    # 12 PM ET
      timezone: America/New_York
    - cron: "0 13 * * 1-5"    #  1 PM ET
      timezone: America/New_York
    - cron: "0 14 * * 1-5"    #  2 PM ET
      timezone: America/New_York
    - cron: "0 15 * * 1-5"    #  3 PM ET
      timezone: America/New_York
    - cron: "15 17 * * 1-5"  #  5:15 PM ET (post-close snapshot)
      timezone: America/New_York
  workflow_call:                # allow other workflows to invoke this
  workflow_dispatch:            # allow manual trigger

permissions:
  contents: write              # needed to commit monitor logs

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Monitor positions
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: ${{ vars.ALPACA_PAPER || 'true' }}
          # Risk limits — must match execute_trades.yml so monitor uses
          # the same effective config as the executor (max_positions,
          # exposure caps, regime overrides, etc.).
          MAX_EXPOSURE_PCT: ${{ vars.MAX_EXPOSURE_PCT || '80.0' }}
          MAX_POSITION_PCT: ${{ vars.MAX_POSITION_PCT || '12.0' }}
          MAX_POSITIONS: ${{ vars.MAX_POSITIONS || '10' }}
          DAILY_LOSS_LIMIT_PCT: ${{ vars.DAILY_LOSS_LIMIT_PCT || '3.0' }}
          MIN_COMPOSITE_SCORE: ${{ vars.MIN_COMPOSITE_SCORE || '20.0' }}
          MIN_CONFIDENCE_SCORE: ${{ vars.MIN_CONFIDENCE_SCORE || '2' }}
          MAX_ENTRY_SLIPPAGE_PCT: ${{ vars.MAX_ENTRY_SLIPPAGE_PCT || '1.5' }}
          MAX_SIGNAL_DRIFT_PCT: ${{ vars.MAX_SIGNAL_DRIFT_PCT || '3.0' }}
          # SPY trend regime
          SPY_REGIME_ENABLED: ${{ vars.SPY_REGIME_ENABLED || 'true' }}
          SPY_BEAR_CONFIRMATION_DAYS: ${{ vars.SPY_BEAR_CONFIRMATION_DAYS || '3' }}
          SPY_BEAR_MAX_POSITIONS: ${{ vars.SPY_BEAR_MAX_POSITIONS || '5' }}
          SPY_BEAR_MIN_COMPOSITE_SCORE: ${{ vars.SPY_BEAR_MIN_COMPOSITE_SCORE || '30.0' }}
          SPY_SEVERE_DRAWDOWN_PCT: ${{ vars.SPY_SEVERE_DRAWDOWN_PCT || '15.0' }}
        run: python -m trading_bot_bl --monitor-only

      - name: Upload monitor logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs-${{ github.run_number }}
          path: execution_logs/monitor_*.json
          retention-days: 14

      - name: Commit monitor logs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add execution_logs/ -f
          git diff --cached --quiet && echo "No new logs" && exit 0
          git commit -m "chore: monitor log $(date +%Y-%m-%d_%H%M)"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
