name: Manual Trigger

# Workaround: workflow_dispatch fails when `timezone` is present in the
# same file (GitHub bug — see community/community#13454).
# Use this workflow to manually run any of the scheduled workflows.
on:
  workflow_dispatch:
    inputs:
      workflow:
        description: "Which workflow to run"
        required: true
        type: choice
        options:
          - generate_signals
          - execute_trades
          - monitor_positions
          - weekly_report

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Dispatching ${{ inputs.workflow }}"

  generate_signals:
    if: inputs.workflow == 'generate_signals'
    uses: ./.github/workflows/generate_signals.yml
    secrets: inherit

  execute_trades:
    if: inputs.workflow == 'execute_trades'
    uses: ./.github/workflows/execute_trades.yml
    secrets: inherit

  monitor_positions:
    if: inputs.workflow == 'monitor_positions'
    uses: ./.github/workflows/monitor_positions.yml
    secrets: inherit

  weekly_report:
    if: inputs.workflow == 'weekly_report'
    uses: ./.github/workflows/weekly_report.yml
    secrets: inherit
