name: "LSE: Generate Signals + Paper Sim"

# Runs before London market open to generate fresh LSE signals,
# then immediately runs the paper trading simulator to track
# what trades the bot WOULD make — no broker connection needed.
#
# LSE opens 8:00 AM London.  6:30 AM gives comfortable buffer.
on:
  schedule:
    - cron: "30 6 * * 1-5"    # 6:30 AM London, weekdays
      timezone: Europe/London
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write              # needed to commit signals + sim state

jobs:
  generate-and-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # No branch guard — cron fires on main, but we checkout the
    # feature branch below.  Workflow_dispatch can target any branch.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: feature/multi-market

      - name: Pull latest changes
        run: git pull --rebase origin feature/multi-market

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore prefetch cache
        uses: actions/cache/restore@v4
        with:
          path: cache/
          key: prefetch-data-lse-
          restore-keys: |
            prefetch-data-lse-

      # ── Step 1: Generate signals ──────────────────────────────
      - name: Generate LSE signals
        run: python -m quant_analysis_bot --config configs/lse.json --all-stocks --top-n 100

      # ── Step 2: Run paper simulator ───────────────────────────
      - name: Run paper trading simulator
        run: python -m trading_bot_bl.paper_sim --config configs/lse.json
        # Reads signals from signals/lse/, updates virtual portfolio
        # in execution_logs/lse/paper_sim_state.json.
        # Checks SL/TP/max-hold exits, enters new BUY signals.

      # ── Step 3: Save everything ───────────────────────────────
      - name: Upload signals as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lse-signals-${{ github.run_number }}
          path: signals/lse/
          retention-days: 30

      - name: Upload paper sim state
        uses: actions/upload-artifact@v4
        with:
          name: lse-paper-sim-${{ github.run_number }}
          path: execution_logs/lse/paper_sim_state.json
          retention-days: 30

      - name: Commit signals + sim state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/lse/ execution_logs/lse/ -f
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: LSE signals + paper sim $(date +%Y-%m-%d)"
          git push
