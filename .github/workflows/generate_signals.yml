name: Generate Signals

# Runs well before market open to generate fresh signals.
# US market opens 9:30 AM ET.  Only needs prior-day close
# data, so running at 7 AM gives a comfortable buffer for
# signal generation (~60 min) plus GitHub cron delay (~30 min)
# to finish before execute_trades fires at 10:15 AM ET.
on:
  schedule:
    - cron: "0 7 * * 1-5"    # 7:00 AM ET, weekdays
      timezone: America/New_York
  workflow_call:               # allow other workflows to invoke this
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write              # needed to commit signal files

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # large stock universe can take a while

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore prefetch cache
        uses: actions/cache/restore@v4
        with:
          path: cache/
          key: prefetch-data-
          restore-keys: |
            prefetch-data-

      - name: Generate signals
        env:
          EXTRA_TICKERS: ${{ vars.EXTRA_TICKERS || '' }}
        run: python -m quant_analysis_bot --all-stocks --top-n 900
        # Adjust --top-n to control how many stocks to analyze.
        # Analysis runs in parallel (auto-detects cores).
        # GH Actions runners have 2 cores, so expect roughly:
        #   200 → ~6 min,  500 → ~14 min,  900 → ~25 min
        # Use --workers 1 to force sequential if needed.

      - name: Upload signals as artifact
        uses: actions/upload-artifact@v4
        with:
          name: signals
          path: signals/
          retention-days: 7

      - name: Commit signals to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/ -f
          git diff --cached --quiet && echo "No new signals" && exit 0
          git commit -m "chore: generate signals $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
