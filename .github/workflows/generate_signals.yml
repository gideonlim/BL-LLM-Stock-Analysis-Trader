name: Generate Signals

# Runs before market open to generate fresh signals.
# US market opens 9:30 AM ET.
# Two crons cover both DST offsets; a guard step skips the wrong one.
on:
  schedule:
    - cron: "0 13 * * 1-5"    # 9 AM EDT (UTC-4, Mar–Nov)
    - cron: "0 14 * * 1-5"    # 9 AM EST (UTC-5, Nov–Mar)
  workflow_call:               # allow other workflows to invoke this
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write              # needed to commit signal files

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # large stock universe can take a while

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: DST guard — skip if not 9 AM ET
        if: github.event_name == 'schedule'
        run: |
          ET_HOUR=$(TZ=America/New_York date +%H)
          echo "Current ET hour: $ET_HOUR"
          if [ "$ET_HOUR" != "09" ]; then
            echo "Not 9 AM ET (got hour $ET_HOUR), skipping run."
            echo "SKIP_RUN=true" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        if: env.SKIP_RUN != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: env.SKIP_RUN != 'true'
        run: pip install -r requirements.txt

      - name: Generate signals
        if: env.SKIP_RUN != 'true'
        env:
          EXTRA_TICKERS: ${{ vars.EXTRA_TICKERS || '' }}
        run: python -m quant_analysis_bot --all-stocks --top-n 900
        # Adjust --top-n to control how many stocks to analyze.
        # Analysis runs in parallel (auto-detects cores).
        # GH Actions runners have 2 cores, so expect roughly:
        #   200 → ~6 min,  500 → ~14 min,  900 → ~25 min
        # Use --workers 1 to force sequential if needed.

      - name: Upload signals as artifact
        if: env.SKIP_RUN != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: signals
          path: signals/
          retention-days: 7

      - name: Commit signals to repo
        if: env.SKIP_RUN != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/ -f
          git diff --cached --quiet && echo "No new signals" && exit 0
          git commit -m "chore: generate signals $(date +%Y-%m-%d)"
          git push
