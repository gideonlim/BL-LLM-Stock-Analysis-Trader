name: Generate Signals

# Runs before market open to generate fresh signals.
# US market opens 9:30 AM ET.
on:
  schedule:
    - cron: "0 9 * * 1-5"    # 9:00 AM ET, weekdays
      timezone: America/New_York
  workflow_call:               # allow other workflows to invoke this
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write              # needed to commit signal files

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # large stock universe can take a while

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate signals
        env:
          EXTRA_TICKERS: ${{ vars.EXTRA_TICKERS || '' }}
        run: python -m quant_analysis_bot --all-stocks --top-n 900
        # Adjust --top-n to control how many stocks to analyze.
        # 200 is a good balance of coverage vs runtime (~10-20 min).
        # 900 if there is a lot fo time, runtime (~15-25 min).
        # Use --top-n 1000 for full universe (takes ~60 min).

      - name: Upload signals as artifact
        uses: actions/upload-artifact@v4
        with:
          name: signals
          path: signals/
          retention-days: 7

      - name: Commit signals to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/ -f
          git diff --cached --quiet && echo "No new signals" && exit 0
          git commit -m "chore: generate signals $(date +%Y-%m-%d)"
          git push
